<!-- ========== ЗАЩИТА ОТ ОШИБОК РАСШИРЕНИЙ ========== -->
<script>
// Этот скрипт выполнится самым первым и заблокирует ошибки расширений
(function() {
    // Перехватываем все ошибки
    const originalAddEventListener = window.addEventListener;
    
    // Оборачиваем addEventListener для защиты
    window.addEventListener = function(type, listener, options) {
        if (type === 'error') {
            const wrappedListener = function(e) {
                try {
                    // Игнорируем ошибки от disk-button
                    if (e.filename && e.filename.includes('disk-button')) {
                        console.log('🛡️ Блокируем ошибку расширения');
                        e.preventDefault?.();
                        e.stopPropagation?.();
                        return;
                    }
                } catch (err) {}
                
                if (typeof listener === 'function') {
                    try {
                        listener(e);
                    } catch (err) {
                        console.log('Ошибка в обработчике:', err);
                    }
                }
            };
            return originalAddEventListener.call(this, type, wrappedListener, options);
        }
        return originalAddEventListener.call(this, type, listener, options);
    };
    
    // Перехватываем ошибки
    window.addEventListener('error', function(e) {
        if (e.filename && e.filename.includes('disk-button')) {
            e.preventDefault();
            e.stopPropagation();
            console.log('🛡️ Заблокирована ошибка расширения');
            return false;
        }
    }, true);
    
    // Для старых браузеров
    window.onerror = function(msg, url, line, col, error) {
        if (url && url.includes('disk-button')) {
            console.log('🛡️ Заблокирована ошибка расширения (onerror)');
            return true;
        }
        return false;
    };
    
    console.log('✅ Защита от ошибок расширений активирована');
})();
</script>

<script>
// ========== ОСНОВНОЙ КОД ПРИЛОЖЕНИЯ ==========
(function() {
    console.log('🚀 Основной скрипт запущен');
    
    // Индикатор загрузки
    const loadingIndicator = document.getElementById('loadingIndicator');
    
    function showLoading() {
        if (loadingIndicator) loadingIndicator.classList.add('active');
    }
    
    function hideLoading() {
        if (loadingIndicator) loadingIndicator.classList.remove('active');
    }

    // ========== НАСТРОЙКИ GITHUB ==========
    const GITHUB_OWNER = 'RusLanMkv';  // Ваш логин
    const GITHUB_REPO = 'pnr-schedule';  // Название репозитория
    const GITHUB_BRANCH = 'main';  // Ветка

    // Загружаем сохраненный токен
    let githubToken = localStorage.getItem('github_token') || '';
    
    // Данные
    let currentYear = 2026;
    let holidays = [];
    let employeeList = [];
    let statuses = [];
    let shortDays = [];
    let events = [];
    let cellData = {};
    let nextEventId = 1;
    let employeePasswords = {};
    
    // История изменений
    let changeHistory = [];
    let nextHistoryId = 1;

    let currentLoggedInEmployee = sessionStorage.getItem('pnr_logged_in_user') || null;

    const monthNames = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
    const weekdays = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

    let currentStartMonth = 0;
    let currentEndMonth = 2;

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ДАТАМИ ==========
    function getMonthDays(year) {
        return [31, (year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0)) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    }
    
    function getDayOffset(month, day, year = currentYear) {
        let monthDays = getMonthDays(year);
        let off = 0;
        for (let m = 0; m < month; m++) off += monthDays[m];
        return off + (day - 1);
    }
    
    function getMonthDayFromOffset(off, year = currentYear) {
        let monthDays = getMonthDays(year);
        let m = 0;
        while (off >= monthDays[m] && m < 11) { off -= monthDays[m]; m++; }
        return { month: m, day: off + 1 };
    }
    
    function getOffsetFromDate(date) {
        let year = date.getFullYear();
        let month = date.getMonth();
        let day = date.getDate();
        return getDayOffset(month, day, year);
    }
    
    function getDateFromOffset(offset) {
        let { month, day } = getMonthDayFromOffset(offset, currentYear);
        return new Date(currentYear, month, day, 12, 0, 0);
    }

    function calculateBrightness(color) {
        let r = parseInt(color.substring(1,3), 16),
            g = parseInt(color.substring(3,5), 16),
            b = parseInt(color.substring(5,7), 16);
        return ((r*299)+(g*587)+(b*114))/1000;
    }

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С GITHUB ==========
    
    function saveGitHubToken() {
        const tokenInput = document.getElementById('githubToken');
        if (tokenInput) {
            const token = tokenInput.value.trim();
            if (token) {
                githubToken = token;
                localStorage.setItem('github_token', token);
                console.log('✅ Токен сохранен в localStorage');
                showNotification('Токен сохранен в браузере', 'success');
            } else {
                githubToken = '';
                localStorage.removeItem('github_token');
                console.log('Токен удален');
            }
        }
    }

    async function getFileSHA(path, retries = 3) {
        if (!githubToken) {
            throw new Error('GitHub токен не указан');
        }

        for (let i = 0; i < retries; i++) {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`;
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    return null;
                }

                if (!response.ok) {
                    throw new Error(`Ошибка получения SHA: ${response.status}`);
                }

                const data = await response.json();
                return data.sha;
            } catch (error) {
                console.log(`Попытка ${i + 1} получения SHA не удалась:`, error.message);
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }
    }

    async function saveFileToGitHub(path, content, message) {
        if (!githubToken) {
            showNotification('Введите GitHub токен в настройках', 'error');
            return false;
        }

        showLoading();
        let retryCount = 0;
        const maxRetries = 3;
        
        while (retryCount < maxRetries) {
            try {
                const contentBase64 = btoa(unescape(encodeURIComponent(content)));
                
                let sha = null;
                try {
                    sha = await getFileSHA(path);
                    console.log(`SHA для ${path}:`, sha);
                } catch (e) {
                    console.log(`Ошибка получения SHA для ${path}:`, e.message);
                }

                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
                
                const body = {
                    message: message,
                    content: contentBase64,
                    branch: GITHUB_BRANCH
                };

                if (sha) {
                    body.sha = sha;
                }

                console.log(`Попытка ${retryCount + 1} сохранения ${path}:`, { sha: sha || 'новый файл' });

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.status === 409) {
                    console.log(`Конфликт при сохранении ${path}, повтор через 1с...`);
                    retryCount++;
                    if (retryCount < maxRetries) {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        continue;
                    }
                }

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Ошибка сохранения');
                }

                showNotification(`✅ ${path} сохранен на GitHub`);
                return true;

            } catch (error) {
                console.error(`Ошибка сохранения ${path}:`, error);
                retryCount++;
                if (retryCount >= maxRetries) {
                    showNotification(`Ошибка: ${error.message}`, 'error');
                    return false;
                }
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }
        
        hideLoading();
        return false;
    }

    async function saveConfig() {
        const config = {
            employeeList,
            statuses,
            holidays,
            shortDays,
            employeePasswords,
            currentYear
        };
        
        const configJson = JSON.stringify(config, null, 2);
        return await saveFileToGitHub(
            'config.json',
            configJson,
            `Обновление настроек от ${new Date().toLocaleString()}`
        );
    }

    async function saveEvents() {
        const eventsData = {
            events,
            cellData,
            nextEventId,
            changeHistory
        };
        
        const eventsJson = JSON.stringify(eventsData, null, 2);
        return await saveFileToGitHub(
            'events.json',
            eventsJson,
            `Обновление событий от ${new Date().toLocaleString()}`
        );
    }

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadConfig() {
        try {
            const response = await fetch('config.json?_=' + Date.now());
            if (!response.ok) throw new Error('Ошибка загрузки config.json');
            const config = await response.json();
            
            employeeList = config.employeeList || [];
            statuses = config.statuses || [];
            holidays = config.holidays || [];
            shortDays = config.shortDays || [];
            employeePasswords = config.employeePasswords || {};
            currentYear = config.currentYear || 2026;
            
            document.getElementById('currentYearLabel').innerText = currentYear;
            
            return true;
        } catch (error) {
            console.error('Ошибка загрузки config.json:', error);
            return false;
        }
    }

    async function loadEvents() {
        try {
            const response = await fetch('events.json?_=' + Date.now());
            if (!response.ok) throw new Error('Ошибка загрузки events.json');
            const eventsData = await response.json();
            
            events = eventsData.events || [];
            cellData = eventsData.cellData || {};
            nextEventId = eventsData.nextEventId || 1;
            changeHistory = eventsData.changeHistory || [];
            nextHistoryId = changeHistory.length > 0 ? Math.max(...changeHistory.map(h => h.id)) + 1 : 1;
            
            return true;
        } catch (error) {
            console.error('Ошибка загрузки events.json:', error);
            return false;
        }
    }

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С СОБЫТИЯМИ ==========
    function addHistoryEntry(action, eventId, user, details) {
        changeHistory.push({
            id: nextHistoryId++,
            action,
            eventId,
            user,
            timestamp: new Date().toISOString(),
            details
        });
    }

    function createEvent(employeeIndices, startOff, endOff, statusName, comment, fact, d1 = 0, d2 = 0) {
        const eventId = nextEventId++;
        const event = { 
            id: eventId, 
            employeeIndices: employeeIndices.slice(), 
            startOffset: startOff, 
            endOffset: endOff, 
            statusName, 
            comment, 
            fact,
            d1,
            d2,
            createdBy: currentLoggedInEmployee,
            createdAt: new Date().toISOString(),
            updatedBy: null,
            updatedAt: null
        };
        events.push(event);
        
        for (let empIdx of employeeIndices) {
            for (let d = startOff; d <= endOff; d++) { 
                cellData[`${empIdx}_${d}`] = eventId; 
            }
        }
        
        const employeeNames = employeeIndices.map(idx => employeeList[idx]?.name).join(', ');
        addHistoryEntry('create', eventId, currentLoggedInEmployee, 
            `Создано событие: ${statusName} для ${employeeNames}`);
        
        saveEvents();
        return eventId;
    }

    function deleteEvent(eventId) {
        const event = events.find(e => e.id === eventId);
        if (!event) return;
        
        event.employeeIndices.forEach(empIdx => {
            for (let d = event.startOffset; d <= event.endOffset; d++) {
                delete cellData[`${empIdx}_${d}`];
            }
        });
        
        events = events.filter(e => e.id !== eventId);
        
        const employeeNames = event.employeeIndices.map(idx => employeeList[idx]?.name).join(', ');
        addHistoryEntry('delete', eventId, currentLoggedInEmployee, 
            `Удалено событие: ${event.statusName} для ${employeeNames}`);
        
        saveEvents();
    }

    function updateEvent(eventId, newEmployeeIndices, newStartOff, newEndOff, newStatusName, newComment, newFact, newD1 = 0, newD2 = 0) {
        const oldEvent = events.find(e => e.id === eventId);
        if (!oldEvent) return;
        
        oldEvent.employeeIndices.forEach(empIdx => {
            for (let d = oldEvent.startOffset; d <= oldEvent.endOffset; d++) {
                delete cellData[`${empIdx}_${d}`];
            }
        });
        
        const updatedEvent = { 
            ...oldEvent,
            employeeIndices: newEmployeeIndices.slice(), 
            startOffset: newStartOff, 
            endOffset: newEndOff, 
            statusName: newStatusName, 
            comment: newComment, 
            fact: newFact,
            d1: newD1,
            d2: newD2,
            updatedBy: currentLoggedInEmployee,
            updatedAt: new Date().toISOString()
        };
        
        events = events.map(e => e.id === eventId ? updatedEvent : e);
        
        newEmployeeIndices.forEach(empIdx => {
            for (let d = newStartOff; d <= newEndOff; d++) {
                cellData[`${empIdx}_${d}`] = eventId;
            }
        });
        
        const employeeNames = newEmployeeIndices.map(idx => employeeList[idx]?.name).join(', ');
        addHistoryEntry('update', eventId, currentLoggedInEmployee, 
            `Обновлено событие: ${newStatusName} для ${employeeNames}`);
        
        saveEvents();
    }

    // ========== ФУНКЦИИ ОТОБРАЖЕНИЯ ==========
    function buildHeader() {
        let start = currentStartMonth, end = currentEndMonth;
        let monthDays = getMonthDays(currentYear);
        
        let monthRow = '<tr class="table-header-row-month"><th rowspan="3">Сотрудник</th>';
        for (let m = start; m <= end; m++) {
            monthRow += `<th colspan="${monthDays[m]}" class="month-header">${monthNames[m]}</th>`;
        }
        monthRow += '</tr>';
        
        let weekdayRow = '<tr class="table-header-weekdays">';
        for (let m = start; m <= end; m++) {
            for (let d = 1; d <= monthDays[m]; d++) {
                let date = new Date(currentYear, m, d);
                let wd = weekdays[date.getDay()];
                let off = getDayOffset(m, d, currentYear);
                let isHol = holidays.some(h => h.dateOffset === off);
                let isWk = [0,6].includes(date.getDay());
                let patternClass = '';
                if (isHol) patternClass = 'holiday-pattern';
                else if (isWk) patternClass = 'weekend-pattern';
                weekdayRow += `<th class="${patternClass}" title="${monthNames[m]} ${d}">${wd}</th>`;
            }
        }
        weekdayRow += '</tr>';
        
        let dayRow = '<tr class="table-header-days">';
        for (let m = start; m <= end; m++) {
            for (let d = 1; d <= monthDays[m]; d++) {
                let off = getDayOffset(m, d, currentYear);
                let isHol = holidays.some(h => h.dateOffset === off);
                let date = new Date(currentYear, m, d);
                let isWk = [0,6].includes(date.getDay());
                let patternClass = '';
                let textClass = '';
                if (isHol) {
                    patternClass = 'holiday-pattern';
                    textClass = 'holiday-text';
                } else if (isWk) {
                    patternClass = 'weekend-pattern';
                    textClass = 'weekend-text';
                }
                let shortClass = shortDays.includes(off) ? 'shortday' : '';
                dayRow += `<th class="${patternClass} ${shortClass} ${textClass}">${d}</th>`;
            }
        }
        dayRow += '</tr>';
        
        const header = document.getElementById('tableHeader');
        if (header) header.innerHTML = monthRow + weekdayRow + dayRow;
    }

    function isWeekend(off) {
        let { month, day } = getMonthDayFromOffset(off, currentYear);
        return [0,6].includes(new Date(currentYear, month, day).getDay());
    }
    
    function getHoliday(off) { return holidays.find(h => h.dateOffset === off); }

    function getTitleRank(title) {
        const rankMap = {
            'Рук.ПНР': 1,
            'Рук.ПО': 2,
            'Рук.РП': 3,
            'Рук.ИР': 4,
            'Рук.АД': 5,
            'Вед.инж': 6,
            'Вед.Инж.эл': 7,
            'Ст.инж': 8,
            'Ст.Инж.эл': 9,
            'инж': 10,
            'Инж.эл': 11,
            'РП': 12,
            'Спец.ИР': 13,
            'Админ': 14,
            'Аналитик': 15,
            'БА': 16
        };
        const normalizedTitle = title.replace(/\s+/g, '');
        return rankMap[normalizedTitle] || rankMap[title] || 999;
    }

    function renderSchedule() {
        buildHeader();
        let start = currentStartMonth, end = currentEndMonth;
        let monthDays = getMonthDays(currentYear);
        let firstOff = getDayOffset(start, 1, currentYear);
        let lastOff = getDayOffset(end, monthDays[end], currentYear);
        let totalDays = lastOff - firstOff + 1;

        let groups = {};
        employeeList.forEach((emp, idx) => { 
            if (!groups[emp.group]) groups[emp.group] = []; 
            groups[emp.group].push({ idx, ...emp }); 
        });
        
        Object.keys(groups).forEach(group => {
            groups[group].sort((a, b) => getTitleRank(a.title) - getTitleRank(b.title));
        });
        
        const groupOrder = ['ПО','ПНР','РП','ИР','АД','БА'].filter(g => groups[g]);
        let tbody = document.getElementById('scheduleBody');
        if (!tbody) return;
        
        let html = '';

        groupOrder.forEach(g => {
            if (groups[g]?.length) {
                html += `<tr class="group-row"><td colspan="${totalDays+1}" style="background:#dbe6f5;">👥   ${g}</td></tr>`;
                groups[g].forEach(emp => {
                    html += '<tr>';
                    html += `<td class="employee-col" data-empidx="${emp.idx}">${emp.name}<br><span>${emp.title}</span></td>`;

                    for (let d = 0; d < totalDays; d++) {
                        let globalDay = firstOff + d;
                        let key = `${emp.idx}_${globalDay}`;
                        let eventId = cellData[key];
                        let holiday = getHoliday(globalDay);
                        let patternClass = isWeekend(globalDay) ? 'weekend-pattern' : '';
                        if (holiday) patternClass = 'holiday-pattern';
                        let shortClass = shortDays.includes(globalDay) ? 'shortday' : '';

                        if (eventId) {
                            let event = events.find(e => e.id === eventId);
                            if (event) {
                                let prevKey = `${emp.idx}_${globalDay - 1}`;
                                let isStart = cellData[prevKey] !== eventId;
                                
                                if (isStart) {
                                    let mainStart = event.startOffset + (event.d1 || 0);
                                    let mainEnd = event.endOffset - (event.d2 || 0);
                                    
                                    let bgColspan = event.endOffset - globalDay + 1;
                                    
                                    html += `<td class="event-cell" colspan="${bgColspan}" data-emp="${emp.idx}" data-start="${globalDay}" data-eventid="${eventId}">`;
                                    
                                    if (event.d1 > 0 || event.d2 > 0) {
                                        let bgBorderColor = event.fact ? '#ffb74a' : '#ff0000';
                                        html += `<div class="event-background" style="border-color: ${bgBorderColor};"></div>`;
                                    }
                                    
                                    let mainOffset = mainStart - globalDay;
                                    let mainColspan = mainEnd - mainStart + 1;
                                    
                                    if (mainColspan > 0 && mainStart <= mainEnd) {
                                        let bgColor = statuses.find(s => s.name === event.statusName)?.color || '#e0e8f5';
                                        let badgeText = event.comment || event.statusName;
                                        let borderColor = event.fact ? bgColor : '#ff0000';
                                        let brightness = calculateBrightness(bgColor);
                                        let textColor = event.fact ? (brightness > 128 ? 'black' : 'white') : '#ff0000';
                                        
                                        let leftPercent = (mainOffset * 100) / bgColspan;
                                        let widthPercent = (mainColspan * 100) / bgColspan;
                                        
                                        html += `<div class="event-badge" style="--event-color:${bgColor}; border-color:${borderColor}; background-color:${bgColor}; color:${textColor}; left: ${leftPercent}%; width: ${widthPercent}%;" title="${event.comment || event.statusName}">${badgeText}</div>`;
                                    }
                                    
                                    html += `</td>`;
                                    d += bgColspan - 1;
                                }
                            } else { 
                                delete cellData[key]; 
                                html += `<td class="${patternClass} ${shortClass}" data-emp="${emp.idx}" data-day="${globalDay}"></td>`; 
                            }
                        } else { 
                            html += `<td class="${patternClass} ${shortClass}" data-emp="${emp.idx}" data-day="${globalDay}"></td>`; 
                        }
                    }
                    html += '</tr>';
                });
            }
        });
        tbody.innerHTML = html;
        
        const legendPanel = document.getElementById('legendPanel');
        if (legendPanel) {
            legendPanel.innerHTML = statuses.map(s =>
                `<div class="legend-item"><span class="color-dot" style="background:${s.color};"></span> ${s.name}</div>`
            ).join('');
        }
    }

    function checkForConflicts() {
        if (isViewOnlyMode) return;
        
        const conflictWarning = document.getElementById('conflictWarning');
        const errorMessage = document.getElementById('errorMessage');
        const saveBtn = document.getElementById('saveEventBtn');
        
        if (conflictWarning) conflictWarning.style.display = 'none';
        if (errorMessage) errorMessage.style.display = 'none';
        
        if (currentSelectedEmployees.length === 0) {
            if (saveBtn) saveBtn.disabled = true;
            return;
        }
        
        const startStr = document.getElementById('eventDateStart')?.value;
        const endStr = document.getElementById('eventDateEnd')?.value;
        
        if (!startStr || !endStr) {
            if (saveBtn) saveBtn.disabled = true;
            return;
        }
        
        let startParts = startStr.split('-').map(Number);
        let endParts = endStr.split('-').map(Number);
        
        let startDate = new Date(startParts[0], startParts[1]-1, startParts[2], 12, 0, 0);
        let endDate = new Date(endParts[0], endParts[1]-1, endParts[2], 12, 0, 0);
        
        if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
            if (errorMessage) {
                errorMessage.innerHTML = '❌ Некорректная дата';
                errorMessage.style.display = 'block';
            }
            if (saveBtn) saveBtn.disabled = true;
            return;
        }
        
        if (startDate > endDate) { 
            if (errorMessage) {
                errorMessage.innerHTML = '❌ Дата начала не может быть позже даты окончания';
                errorMessage.style.display = 'block';
            }
            if (saveBtn) saveBtn.disabled = true;
            return; 
        }
        
        let startOff = getOffsetFromDate(startDate);
        let endOff = getOffsetFromDate(endDate);
        
        let d1 = parseInt(document.getElementById('d1Field')?.value) || 0;
        let d2 = parseInt(document.getElementById('d2Field')?.value) || 0;
        let mainStart = startOff + d1;
        let mainEnd = endOff - d2;
        
        if (mainStart > mainEnd) {
            if (errorMessage) {
                errorMessage.innerHTML = '❌ Сдвиги слишком большие (основной блок пуст)';
                errorMessage.style.display = 'block';
            }
            if (saveBtn) saveBtn.disabled = true;
            return;
        }
        
        let conflicts = [];
        let conflictSet = new Set();
        
        currentSelectedEmployees.forEach(empIdx => {
            for (let d = mainStart; d <= mainEnd; d++) {
                let key = `${empIdx}_${d}`;
                let existingEventId = cellData[key];
                
                if (existingEventId && existingEventId !== currentEditEventId) {
                    let event = events.find(e => e.id === existingEventId);
                    if (event) {
                        let empName = employeeList[empIdx]?.name || 'Неизвестный сотрудник';
                        let { month, day } = getMonthDayFromOffset(d);
                        let conflictKey = `${empIdx}_${month}_${day}`;
                        
                        if (!conflictSet.has(conflictKey)) {
                            conflictSet.add(conflictKey);
                            conflicts.push(`${empName}: ${monthNames[month]} ${day} (${event.statusName})`);
                        }
                    }
                }
            }
        });
        
        if (conflicts.length > 0) {
            if (conflictWarning) {
                conflictWarning.style.display = 'block';
                conflictWarning.innerHTML = '⚠️ Обнаружены пересечения:<br>' + conflicts.slice(0,5).join('<br>');
                if (conflicts.length > 5) {
                    conflictWarning.innerHTML += `<br>...и еще ${conflicts.length - 5}`;
                }
            }
            if (saveBtn) saveBtn.disabled = true;
            hasConflicts = true;
        } else {
            if (conflictWarning) conflictWarning.style.display = 'none';
            if (saveBtn) saveBtn.disabled = false;
            hasConflicts = false;
        }
    }

    function openEmployeeEventsModal(empIdx) {
        const emp = employeeList[empIdx];
        if (!emp) return;
        
        const title = document.getElementById('employeeEventsTitle');
        if (title) title.textContent = `📋 События: ${emp.name}`;
        
        const empEvents = [];
        events.forEach(event => {
            if (event.employeeIndices.includes(empIdx)) {
                empEvents.push(event);
            }
        });
        
        empEvents.sort((a, b) => a.startOffset - b.startOffset);
        
        const today = new Date();
        today.setHours(12, 0, 0, 0);
        const todayOffset = getOffsetFromDate(today);
        
        const currentAndFuture = empEvents.filter(e => e.endOffset >= todayOffset);
        const past = empEvents.filter(e => e.endOffset < todayOffset);
        
        currentAndFuture.sort((a, b) => a.startOffset - b.startOffset);
        past.sort((a, b) => b.startOffset - a.startOffset);
        
        const sortedEvents = [...currentAndFuture, ...past];
        
        const listContainer = document.getElementById('employeeEventsList');
        if (!listContainer) return;
        
        if (sortedEvents.length === 0) {
            listContainer.innerHTML = '<div class="no-events">Нет событий</div>';
        } else {
            let html = '';
            sortedEvents.forEach(event => {
                const startDate = getDateFromOffset(event.startOffset);
                const endDate = getDateFromOffset(event.endOffset);
                const status = statuses.find(s => s.name === event.statusName) || { color: '#cccccc', name: event.statusName };
                
                const eventEmployees = event.employeeIndices
                    .map(idx => employeeList[idx]?.name)
                    .filter(name => name)
                    .join(', ');
                
                let periodClass = 'past';
                if (event.startOffset <= todayOffset && event.endOffset >= todayOffset) {
                    periodClass = 'current';
                } else if (event.startOffset > todayOffset) {
                    periodClass = 'future';
                }
                
                const canEdit = !!currentLoggedInEmployee;
                const viewOnlyClass = !canEdit ? 'view-only' : '';
                
                html += `
                    <div class="event-item ${periodClass} ${viewOnlyClass}" data-event-id="${event.id}" style="border-left-color: ${status.color};">
                        <div class="event-date">${startDate.toLocaleDateString('ru-RU')} - ${endDate.toLocaleDateString('ru-RU')}</div>
                        <div class="event-status">
                            <span class="event-indicator" style="background: ${status.color};"></span>
                            ${status.name} ${event.fact ? '✅' : ''}
                        </div>
                        ${event.comment ? `<div class="event-comment">📌 ${event.comment}</div>` : ''}
                        <div class="event-employees-list">
                            <span>👥 Участники:</span> ${eventEmployees}
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
            
            listContainer.addEventListener('click', function(e) {
                const eventItem = e.target.closest('.event-item');
                if (!eventItem) return;
                
                const eventId = parseInt(eventItem.dataset.eventId);
                if (isNaN(eventId)) return;
                
                if (currentLoggedInEmployee) {
                    openEventModalForEvent(eventId);
                    const modal = document.getElementById('employeeEventsModal');
                    if (modal) modal.classList.remove('active');
                }
            });
        }
        
        const modal = document.getElementById('employeeEventsModal');
        if (modal) modal.classList.add('active');
    }

    // ========== УВЕДОМЛЕНИЯ ==========
    function showNotification(message, type = 'success') {
        console.log(`📢 [${type}]: ${message}`);
        
        const notification = document.createElement('div');
        notification.className = 'save-notification';
        notification.style.background = type === 'success' ? '#4CAF50' : '#f44336';
        notification.textContent = message;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'slideIn 0.3s ease-out reverse';
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 300);
        }, 2000);
    }

        const addEmployeeBtn = document.getElementById('addEmployeeBtn');
        if (addEmployeeBtn) {
            addEmployeeBtn.addEventListener('click', ()=>{
                let n = document.getElementById('newEmployeeName')?.value.trim();
                if (n) { 
                    employeeList.push({
                        name: n, 
                        title: document.getElementById('newEmployeeTitle')?.value || 'инж', 
                        group: document.getElementById('newEmployeeGroup')?.value || 'ПО', 
                        isActive: document.getElementById('newEmployeeActive')?.checked || false
                    }); 
                    renderSchedule(); 
                    renderSettingsEmployees(); 
                    renderLoginEmployeeList('');
                    saveConfig();
                    
                    const nameInput = document.getElementById('newEmployeeName');
                    if (nameInput) nameInput.value = '';
                    
                    showNotification('Сотрудник добавлен');
                }
            });
        }
        
        const addStatusBtn = document.getElementById('addStatusBtn');
        if (addStatusBtn) {
            addStatusBtn.addEventListener('click', ()=>{
                let n = document.getElementById('newStatusName')?.value.trim(); 
                let c = document.getElementById('newStatusColor')?.value;
                if (n && !statuses.find(s => s.name === n)) { 
                    statuses.push({name: n, color: c || '#a5d6ff'}); 
                    renderSchedule(); 
                    renderSettingsStatuses(); 
                    saveConfig();
                    
                    const nameInput = document.getElementById('newStatusName');
                    if (nameInput) nameInput.value = '';
                    
                    showNotification('Статус добавлен');
                }
            });
        }
        
        const addHolidayBtn = document.getElementById('addHolidayBtn');
        if (addHolidayBtn) {
            addHolidayBtn.addEventListener('click', ()=>{
                let d = document.getElementById('newHolidayDate')?.value; 
                if (!d) return;
                let [y, m, day] = d.split('-').map(Number);
                if (y !== currentYear) { 
                    alert("Праздник только для текущего года " + currentYear); 
                    return; 
                }
                let off = getDayOffset(m-1, day, y);
                if (!holidays.find(h => h.dateOffset === off)) { 
                    holidays.push({ dateOffset: off, name: "Праздник" }); 
                    renderSchedule(); 
                    renderHolidays(); 
                    saveConfig();
                    showNotification('Праздник добавлен');
                }
            });
        }
        
        const addShortdayBtn = document.getElementById('addShortdayBtn');
        if (addShortdayBtn) {
            addShortdayBtn.addEventListener('click', ()=>{
                let d = document.getElementById('newShortdayDate')?.value; 
                if (!d) return;
                let [y, m, day] = d.split('-').map(Number);
                if (y !== currentYear) { 
                    alert("Сокращённый день только для " + currentYear); 
                    return; 
                }
                let off = getDayOffset(m-1, day, y);
                if (!shortDays.includes(off)) { 
                    shortDays.push(off); 
                    renderSchedule(); 
                    renderShortdays(); 
                    saveConfig();
                    showNotification('Сокращённый день добавлен');
                }
            });
        }
        
        // Таймер
        setInterval(() => {
            let now = new Date();
            let h = ('0' + now.getHours()).slice(-2);
            let m = ('0' + now.getMinutes()).slice(-2);
            let d = ('0' + now.getDate()).slice(-2);
            let mo = ('0' + (now.getMonth()+1)).slice(-2);
            
            const dateTimeEl = document.getElementById('currentDateTime');
            if (dateTimeEl) {
                dateTimeEl.innerHTML = `${d}.${mo}.${now.getFullYear()} _ ${h}:${m}`;
            }
        }, 1000);
        
        // Загружаем данные
        showLoading();
        Promise.all([loadConfig(), loadEvents()]).then(() => {
            renderSchedule();
            updateUserDisplay();
            renderLoginEmployeeList('');
            hideLoading();
            console.log('✅ Загрузка данных завершена');
        }).catch(error => {
            console.error('❌ Ошибка загрузки данных:', error);
            hideLoading();
        });
    }

    // Запускаем инициализацию
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<!-- ========== АВАРИЙНЫЙ ОБРАБОТЧИК ========== -->
<script>
document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'settingsBtn') {
        console.log('🚨 Аварийный обработчик: клик по settingsBtn');
        e.preventDefault();
        e.stopPropagation();
        
        const modal = document.getElementById('settingsModal');
        if (modal) {
            modal.classList.add('active');
            console.log('✅ Настройки открыты через аварийный обработчик');
        }
    }
}, true);
</script>
